<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛒 My E-Commerce Store</h1>
    <p>Azure App Service Demo</p>
</header>

<section class="products">
    <div class="product">
        <h2>Laptop</h2>
        <p>Price: ₹50,000</p>
        <button onclick="addToCart('Laptop', 50000)">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Mobile</h2>
        <p>Price: ₹20,000</p>
        <button onclick="addToCart('Mobile', 20000)">Add to Cart</button>
    </div>

    <div class="product">
        <h2>Headphones</h2>
        <p>Price: ₹2,000</p>
        <button onclick="addToCart('Headphones', 2000)">Add to Cart</button>
    </div>
</section>

<section class="cart">
    <h2>🛍 Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
</section>

<footer>
    <p>© 2026 My E-Commerce Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
